data:
  data_dir: "../training_data_test"
  crop_size: 256
  batch_size: 4
  num_workers: 4

model:
  in_channels: 13
  out_channels: 3
  base_channels: 16

loss:
  lambda_l1: 1.0
  lambda_perceptual: 0.1

training:
  epochs: 10
  patience: 5
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  lr_scheduler: cosine
  warmup_epochs: 2
  mixed_precision: true
  checkpoint_interval: 5
  log_interval: 10
  sample_interval: 5
  seed: 42

export:
  output_dir: "../models"
