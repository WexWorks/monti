data:
  data_dir: "../training_data_st"
  data_format: "auto"  # auto | exr | safetensors
  crop_size: 256
  batch_size: 8
  num_workers: 12

model:
  in_channels: 19
  out_channels: 6
  base_channels: 32

loss:
  lambda_l1: 1.0
  lambda_perceptual: 0.1

training:
  epochs: 200
  patience: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  lr_scheduler: cosine
  warmup_epochs: 5
  mixed_precision: true
  checkpoint_interval: 10
  log_interval: 50
  sample_interval: 10
  seed: 42

export:
  output_dir: "../models"
