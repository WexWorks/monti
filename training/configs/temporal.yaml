data:
  data_dir: "D:/training_data_temporal_st"
  data_format: "temporal_safetensors"
  # Window size is baked into the data by preprocess_temporal.py --window N.
  # Regenerate data with --window 16 --stride 8 to extend to 16-frame sequences.
  # Reduce batch_size to 2 if GPU OOM with 16-frame windows.
  batch_size: 4
  num_workers: 4

model:
  type: temporal_residual
  base_channels: 32
  max_mv_for_weight: 0.05      # motion magnitude at which velocity prior saturates to 1.0

loss:
  lambda_l1: 1.0
  lambda_perceptual: 0.25
  lambda_temporal: 0.5
  lambda_blend_weight: 0.5     # supervised blend weight supervision
  blend_weight_threshold: 0.05 # reprojection MAE above this → force w=1

training:
  epochs: 200
  patience: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  lr_scheduler: cosine
  warmup_epochs: 10
  mixed_precision: true
  checkpoint_interval: 10
  log_interval: 50
  sample_interval: 10
  seed: 42

export:
  output_dir: "../models"
