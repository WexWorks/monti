data:
  data_dir: "D:/training_data_temporal_st"
  data_format: "temporal_safetensors"
  # Window size is baked into the data by preprocess_temporal.py --window N.
  # Current data uses --window 16 --stride 8 (16-frame sequences).
  batch_size: 8
  num_workers: 1
  max_train_samples: 200  # Quick validation — remove for full training

model:
  type: temporal_residual
  base_channels: 64
  max_mv_for_weight: 0.05      # motion magnitude at which velocity prior saturates to 1.0

loss:
  # Single reconstruction loss: L1 in log1p space on remodulated radiance
  lambda_l1: 0.0
  lambda_perceptual: 0.0
  lambda_radiance_l1: 0.0
  lambda_hue: 0.0
  lambda_log_l1: 0.0
  lambda_log_radiance_l1: 1.0

  # Temporal and blend weight disabled — get one good result first
  loss_space: "log1p"
  lambda_temporal: 0.0
  lambda_blend_weight: 0.0
  blend_weight_threshold: 0.1

training:
  epochs: 20
  patience: 30
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  lr_scheduler: cosine
  warmup_epochs: 10
  mixed_precision: true
  checkpoint_interval: 10
  log_interval: 50
  sample_interval: 5
  seed: 42

export:
  output_dir: "../models"
